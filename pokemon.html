<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Adventure</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div id="story-container">
            <!-- Story content will be dynamically loaded here -->
        </div>
    </div>
    <script>
        // Set theme before scripts load
        window.themeInitialized = true;
        window.currentTheme = 'pokemon';
    </script>
    <script src="stories.js"></script>
    <script src="app.js"></script>
    <!-- Load the YouTube IFrame Player API code asynchronously -->
    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            // YouTube API is ready - player will be initialized when needed
            window.rickrollPlayerReady = true;
        }
        
        // Load story for this specific theme
        function initStory() {
            document.body.className = 'pokemon';
            if (typeof router !== 'undefined' && typeof stories !== 'undefined' && stories.pokemon) {
                router.loadStory('pokemon', 'start');
            } else {
                // Wait a bit longer if scripts aren't ready
                setTimeout(initStory, 50);
            }
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initStory);
        } else {
            initStory();
        }
    </script>
</body>
</html>
