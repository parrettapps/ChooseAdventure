<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Adventure</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .landing-page {
            text-align: center;
            padding: 60px 40px;
        }
        .landing-page h1 {
            font-size: 3em;
            margin-bottom: 40px;
            color: #2c3e50;
        }
        .theme-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        .theme-card {
            background: white;
            border-radius: 20px;
            padding: 40px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .theme-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }
        .theme-card h2 {
            font-size: 2em;
            margin-bottom: 20px;
        }
        .theme-card.star-wars {
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            color: #ffd700;
        }
        .theme-card.harry-potter {
            background: linear-gradient(135deg, #8b4513 0%, #654321 100%);
            color: #f5deb3;
            border: 3px solid #daa520;
        }
        .theme-card.minecraft {
            background: linear-gradient(135deg, #90ee90 0%, #228b22 100%);
            color: #2f4f2f;
            border: 4px solid #8b4513;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="story-container">
            <div class="landing-page">
                <h1>🎁 Choose Your Adventure 🎁</h1>
                <p style="font-size: 1.3em; margin-bottom: 40px; color: #444;">
                    Select your story and begin an incredible journey!
                </p>
                <div class="theme-options">
                    <a href="starwars.html" class="theme-card star-wars">
                        <h2>⭐ Star Wars ⭐</h2>
                        <p>Embark on a galactic adventure as a Jedi Padawan!</p>
                    </a>
                    <a href="harrypotter.html" class="theme-card harry-potter">
                        <h2>⚡ Harry Potter ⚡</h2>
                        <p>Begin your magical journey at Hogwarts!</p>
                    </a>
                    <a href="minecraft.html" class="theme-card minecraft">
                        <h2>🎮 Minecraft 🎮</h2>
                        <p>Build, explore, and create in a blocky world!</p>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
